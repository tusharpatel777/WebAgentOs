<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgentOS Button Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px;
    }

    h1 { font-size: 24px; color: #94a3b8; letter-spacing: 1px; }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 500px;
    }

    button {
      padding: 24px 16px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-login    { background: #3b82f6; color: #fff; }
    #btn-signup   { background: #22c55e; color: #fff; }
    #btn-buy      { background: #f59e0b; color: #000; }
    #btn-delete   { background: #ef4444; color: #fff; }

    button.clicked {
      transform: scale(0.95);
      border-color: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    #result {
      font-size: 20px;
      font-weight: 700;
      padding: 20px 40px;
      border-radius: 12px;
      background: #1e293b;
      min-width: 300px;
      text-align: center;
      min-height: 66px;
      transition: all 0.3s;
    }

    #result.success { background: #14532d; color: #86efac; }
    #result.danger  { background: #450a0a; color: #fca5a5; }
    #result.neutral { background: #1e293b; color: #94a3b8; }

    .log {
      width: 100%;
      max-width: 500px;
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #64748b;
      max-height: 160px;
      overflow-y: auto;
    }

    .log p { padding: 2px 0; border-bottom: 1px solid #0f172a; }
    .log p span { color: #38bdf8; }
  </style>
</head>
<body>

  <h1>🤖 AgentOS — Button Click Test</h1>

  <div style="width: 100%; max-width: 500px; display:flex; gap:10px;">
    <input
      id="test-input"
      type="search"
      placeholder="Type here to test agent typing…"
      style="flex:1; padding:14px 14px; border-radius:12px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; outline:none; font-size:14px;"
    />
    <button
      id="test-submit"
      onclick="handleInputSubmit()"
      style="padding:14px 16px; border-radius:12px; border:0; cursor:pointer; background:#64748b; color:#0b1220; font-weight:800;"
    >
      Submit
    </button>
  </div>

  <div class="btn-grid">
    <button id="btn-login"  onclick="handleClick('Login',  'success')">🔐 Login</button>
    <button id="btn-signup" onclick="handleClick('Sign Up', 'success')">✅ Sign Up</button>
    <button id="btn-buy"    onclick="handleClick('Buy Now', 'success')">🛒 Buy Now</button>
    <button id="btn-delete" onclick="handleClick('Delete',  'danger')"> 🗑️ Delete Account</button>
  </div>

  <!-- Below-the-fold / ecommerce patterns -->
  <div style="height: 900px"></div>

  <div style="width: 100%; max-width: 700px; background:#111827; border:1px solid #334155; border-radius:12px; padding:16px;">
    <h2 style="margin-bottom:10px; color:#e2e8f0; font-size:18px;">Fake Product Page</h2>

    <!-- Click handler intentionally on the parent, not the text node -->
    <div id="atc-parent" style="display:inline-flex; align-items:center; gap:10px; padding:14px 18px; background:#22c55e; color:#052e16; border-radius:10px; cursor:pointer; font-weight:800;">
      <span style="font-size:18px;">Add to Cart</span>
      <span style="opacity:.8;">(parent handles click)</span>
    </div>

    <div style="height: 18px"></div>

    <div id="shadow-host" style="padding:12px; border:1px dashed #475569; border-radius:10px;">
      Shadow DOM container (button inside shadow root)
    </div>

    <div style="height: 18px"></div>

    <iframe id="atc-iframe" style="width:100%; height:90px; border:1px solid #334155; border-radius:10px;"></iframe>
  </div>

  <!-- Sticky bottom bar CTA -->
  <div id="sticky-bar" style="position:fixed; left:0; right:0; bottom:0; padding:12px; background:rgba(15,23,42,.92); border-top:1px solid #334155; display:flex; justify-content:center; gap:12px;">
    <button id="sticky-atc" onclick="handleClick('Add to Cart (Sticky)', 'success')" style="background:#38bdf8; color:#0b1220;">Add to Cart</button>
  </div>

  <div id="result" class="neutral">Waiting for click…</div>

  <div class="log" id="log">
    <p>Click log will appear here.</p>
  </div>

  <script>
    let clickCount = 0;

    function handleClick(label, type) {
      clickCount++;
      const result = document.getElementById("result");
      const log    = document.getElementById("log");

      result.textContent = `✓ "${label}" button was clicked!`;
      result.className   = type;

      // Highlight clicked button briefly
      const btns = document.querySelectorAll("button");
      btns.forEach(b => b.classList.remove("clicked"));
      event.target.classList.add("clicked");
      setTimeout(() => event.target.classList.remove("clicked"), 600);

      // Add to log
      const entry = document.createElement("p");
      entry.innerHTML = `<span>#${clickCount}</span> [${new Date().toLocaleTimeString()}] → <b>${label}</b>`;
      log.prepend(entry);
    }

    function handleInputSubmit() {
      const v = document.getElementById("test-input").value;
      handleClick(`Input submit: ${v || "(empty)"}`, "success");
    }

    document.getElementById("test-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleInputSubmit();
    });

    // Parent-handler "Add to Cart" (text is a child)
    document.getElementById("atc-parent").addEventListener("click", () => handleClick("Add to Cart (Parent)", "success"));

    // Shadow DOM "Add to Cart"
    const host = document.getElementById("shadow-host");
    const sr = host.attachShadow({ mode: "open" });
    sr.innerHTML = `
      <style>
        button{ padding:10px 14px; border-radius:10px; border:0; cursor:pointer; font-weight:800; background:#f59e0b; color:#111827; }
      </style>
      <button id="shadow-atc">Add to Cart</button>
    `;
    sr.getElementById("shadow-atc").addEventListener("click", () => handleClick("Add to Cart (Shadow)", "success"));

    // Same-origin iframe "Add to Cart"
    const iframe = document.getElementById("atc-iframe");
    iframe.srcdoc = `
      <!doctype html>
      <html><body style="margin:0; font-family:system-ui; background:#0b1220; color:#e2e8f0; display:flex; align-items:center; justify-content:center; height:100%;">
        <button id="iframe-atc" style="padding:10px 14px; border-radius:10px; border:0; cursor:pointer; font-weight:800; background:#a78bfa; color:#111827;">Add to Cart</button>
        <script>
          document.getElementById('iframe-atc').addEventListener('click', () => parent.postMessage({ type:'IFRAME_ATC' }, '*'));
        <\/script>
      </body></html>
    `;
    window.addEventListener("message", (e) => {
      if (e.data?.type === "IFRAME_ATC") handleClick("Add to Cart (iFrame)", "success");
    });
  </script>
</body>
</html>
