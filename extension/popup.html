<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebAgentOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🧠 WebAgentOS</h1>
      <span id="status-dot" class="dot offline" title="Brain status"></span>
    </header>

    <div class="input-row">
      <textarea id="goalInput" placeholder="Type your goal, or press 🎤 to speak…" rows="3"></textarea>
      <button id="voiceBtn" title="Speak your goal">🎤</button>
    </div>

    <div class="btn-row">
      <button id="runBtn">▶ Run Agent</button>
      <button id="stopBtn" disabled>■ Stop</button>
    </div>

    <!-- Human-in-the-loop approval dialog -->
    <div id="approvalBox" class="approval-box hidden">
      <p id="approvalMsg"></p>
      <div class="approval-btns">
        <button id="approveBtn">✅ Allow</button>
        <button id="denyBtn">❌ Block</button>
      </div>
    </div>

    <div id="log" class="log">
      <p class="hint">Agent steps will appear here…</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
